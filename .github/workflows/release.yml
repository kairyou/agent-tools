name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release for the tag
  id-token: write # npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history: release notes list commits since the previous tag
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs a newer npm than Node 22 bundles.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test
      - run: npm publish
      # --generate-notes only lists merged PRs; this repo commits directly to
      # main, so build the notes from commit subjects instead.
      - run: |
          prev="$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || true)"
          range="${prev:+$prev..}$GITHUB_REF_NAME"
          # Skip npm version's bare "x.y.z" bump commits.
          notes="$(git log --pretty='- %s' --invert-grep --grep='^[0-9]\+\.[0-9]\+\.[0-9]\+$' "$range")"
          if [ -n "$prev" ]; then
            notes="$notes

          **Full Changelog**: https://github.com/$GITHUB_REPOSITORY/compare/$prev...$GITHUB_REF_NAME"
          fi
          gh release create "$GITHUB_REF_NAME" --notes "$notes"
        env:
          GH_TOKEN: ${{ github.token }}
